name: Build canary-asr image

on:
  push:
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Free runner disk space
        # build-push-action otherwise runs into disk pressure. Image grew to
        # ~13 GB after baking in Canary + Parakeet weights (2026-07-15), so
        # cleanup expanded beyond the original ~10 GB image's requirements.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/julia* \
                      /opt/az /opt/microsoft /usr/lib/jvm /usr/local/lib/node_modules
          sudo docker image prune --all --force
          df -h

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/canary-asr:v1
            ghcr.io/${{ github.repository_owner }}/canary-asr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
